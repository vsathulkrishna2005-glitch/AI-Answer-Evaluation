<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>📊 Student Results</h1>

    <div class="card">
        <table>
            <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Marks</th>
                <th>Feedback</th>
            </tr>

            {% for student in results %}
            <tr>
                <td>{{ student.rank }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.marks }}/10</td>
                <td>{{ student.feedback }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <a href="/" class="back-btn">⬅ Back</a>

</div>

</body>
</html>
